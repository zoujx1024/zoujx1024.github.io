<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>权益核销管理APP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 overflow-x-hidden">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg">
        <!-- 头部 -->
        <header class="bg-blue-600 text-white p-4 sticky top-0 z-10">
            <h1 class="text-xl font-bold">权益核销管理系统</h1>
            <p class="text-sm opacity-90">自定义分类 · 支持增删改 · 数据自动保存</p>
        </header>

        <!-- 内容区 -->
        <main class="p-3 pb-16">
            <!-- 新建分类按钮 -->
            <button onclick="addCategory()" class="w-full mb-4 py-3 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700">
                + 新建分类
            </button>
            <!-- 分类列表 -->
            <div id="categoryList"></div>
        </main>
    </div>

    <!-- 产品详情弹窗 -->
    <div id="productModal" class="fixed inset-0 bg-black/50 z-20 hidden overflow-y-auto">
        <div class="bg-white rounded-t-xl relative bottom-0 w-full max-w-md mx-auto min-h-[70vh] max-h-[90vh] overflow-auto">
            <div class="p-4 border-b sticky top-0 bg-white z-10">
                <div class="flex justify-between items-center">
                    <h2 id="modalTitle" class="text-lg font-bold"></h2>
                    <button onclick="closeProductModal()" class="text-2xl leading-none px-2 py-1">&times;</button>
                </div>
                <!-- 状态标签 -->
                <div class="flex gap-2 mt-3 overflow-x-auto pb-1">
                    <button class="tab-btn active" data-tab="unactivated" onclick="switchTab(this)">未激活(<span id="countUnactivated">0</span>)</button>
                    <button class="tab-btn" data-tab="pending" onclick="switchTab(this)">待核销(<span id="countPending">0</span>)</button>
                    <button class="tab-btn" data-tab="done" onclick="switchTab(this)">完毕(<span id="countDone">0</span>)</button>
                </div>
            </div>
            <div class="p-3">
                <div id="tabContent" class="mb-20"></div>
                <div id="batchBtn" class="fixed bottom-5 w-[calc(100%-2.5rem)] max-w-[29rem] hidden">
                    <button id="batchActionBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold" onclick="batchAction()"></button>
                </div>
            </div>
        </div>
    </div>

<script>
// 默认初始数据
const defaultData = {
    categories: [
        {
            name: "电费",
            products: [
                {id: 1, name: "爱家悦享会员9.9元", total: 3, unactivated: [1,2,3], pending: [], done: []},
                {id: 2, name: "电费缴费权益包20元", total: 2, unactivated: [1,2], pending: [], done: []},
                {id: 3, name: "电费缴费权益包30元", total: 2, unactivated: [1,2], pending: [], done: []},
                {id: 4, name: "爱家服务10元B版", total: 3, unactivated: [1,2,3], pending: [], done: []},
                {id: 5, name: "爱家悦享会员10元版", total: 3, unactivated: [1,2,3], pending: [], done: []},
                {id: 6, name: "plus会员20元", total: 2, unactivated: [1,2], pending: [], done: []}
            ]
        },
        {
            name: "商超",
            products: [
                {id: 7, name: "生活会员8元粮油", total: 1, unactivated: [1], pending: [], done: []},
                {id: 8, name: "生活会员8元", total: 2, unactivated: [1,2], pending: [], done: []},
                {id: 9, name: "生活会员10元折扣7.9元", total: 2, unactivated: [1,2], pending: [], done: []},
                {id: 10, name: "爱家优享会员19.9元", total: 3, unactivated: [1,2,3], pending: [], done: []},
                {id: 11, name: "爱家服务10元A版", total: 2, unactivated: [1,2], pending: [], done: []},
                {id: 12, name: "爱家服务20元B版", total: 4, unactivated: [1,2,3,4], pending: [], done: []},
                {id: 13, name: "生活会员惠换机10元", total: 2, unactivated: [1,2], pending: [], done: []},
                {id: 14, name: "12580惠生活10元", total: 2, unactivated: [1,2], pending: [], done: []}
            ]
        }
    ]
};

let appData = {};
let currentProduct = null;
let currentCategoryId = null;
let currentTab = "unactivated";

// 本地存储读写
function loadData() {
    const saved = localStorage.getItem('权益管理数据');
    if(saved) {
        appData = JSON.parse(saved);
    } else {
        appData = JSON.parse(JSON.stringify(defaultData));
        saveData();
    }
}

function saveData() {
    localStorage.setItem('权益管理数据', JSON.stringify(appData));
}

// 获取所有产品id，用来生成新id
function getAllProductId() {
    let ids = [];
    appData.categories.forEach(cat => {
        cat.products.forEach(p => ids.push(p.id));
    });
    return ids;
}

// 新建分类
function addCategory() {
    const name = prompt('请输入分类名称：');
    if(!name || name.trim() === '') return;
    appData.categories.push({
        name: name.trim(),
        products: []
    });
    saveData();
    renderCategoryList();
}

// 编辑分类
function editCategory(catIndex, e) {
    e.stopPropagation();
    const cat = appData.categories[catIndex];
    const newName = prompt('请输入新的分类名称：', cat.name);
    if(!newName || newName.trim() === '') return;
    cat.name = newName.trim();
    saveData();
    renderCategoryList();
}

// 删除分类
function deleteCategory(catIndex, e) {
    e.stopPropagation();
    if(!confirm('确认要删除这个分类吗？删除后所有产品都会被清除，无法恢复！')) return;
    appData.categories.splice(catIndex, 1);
    saveData();
    renderCategoryList();
}

// 新建产品
function addProduct(catIndex, e) {
    e.stopPropagation();
    const name = prompt('请输入权益产品名称：');
    if(!name || name.trim() === '') return;
    const total = parseInt(prompt('请输入这份权益的总数量：'));
    if(isNaN(total) || total <= 0) {
        alert('总数量必须是合法正数字！');
        return;
    }
    // 生成唯一id
    const allIds = getAllProductId();
    const newId = allIds.length > 0 ? Math.max(...allIds) + 1 : 1;
    // 生成序号数组
    const unactivated = Array.from({length: total}, (_, i) => i+1);
    appData.categories[catIndex].products.push({
        id: newId,
        name: name.trim(),
        total: total,
        unactivated: unactivated,
        pending: [],
        done: []
    });
    saveData();
    renderCategoryList();
}

// 删除产品
function deleteProduct(catIndex, productId, e) {
    e.stopPropagation();
    if(!confirm('确认要删除这个权益产品吗？删除后无法恢复！')) return;
    const cat = appData.categories[catIndex];
    cat.products = cat.products.filter(p => p.id !== productId);
    saveData();
    renderCategoryList();
}

// 编辑产品名称
function editProductName(catIndex, productId, e) {
    e.stopPropagation();
    const cat = appData.categories[catIndex];
    const product = cat.products.find(p => p.id === productId);
    const newName = prompt('请输入新的产品名称：', product.name);
    if(!newName || newName.trim() === '') return;
    product.name = newName.trim();
    saveData();
    renderCategoryList();
}

// 渲染分类列表
function renderCategoryList() {
    const container = document.getElementById('categoryList');
    if(appData.categories.length === 0) {
        container.innerHTML = '<p class="text-center text-gray-400 py-10">暂无分类，点击上方按钮新建分类</p>';
        return;
    }
    container.innerHTML = appData.categories.map((cat, catIndex) => {
        // 计算分类统计：总共份数 + 剩余未完毕份数
        const totalAll = cat.products.reduce((sum, p) => sum + p.total, 0);
        const remainingAll = cat.products.reduce((sum, p) => sum + p.unactivated.length + p.pending.length, 0);
        return `
        <div class="mb-4 border rounded-lg overflow-hidden">
            <div class="bg-gray-100 p-3 font-bold text-lg flex justify-between items-center cursor-pointer" onclick="toggleCategory(this)">
                <span class="flex-1">${cat.name}</span>
                <span class="text-sm text-gray-500 font-normal mr-2">总共${totalAll}份 · 剩${remainingAll}份未完毕</span>
                <button onclick="editCategory(${catIndex}, event)" class="text-blue-600 text-sm px-2 py-1 mr-1">编辑</button>
                <button onclick="deleteCategory(${catIndex}, event)" class="text-red-600 text-sm px-2 py-1">删除</button>
                <span class="toggle-icon ml-2">▼</span>
            </div>
            <div class="product-list hidden p-2">
                ${cat.products.map(p => {
                    // 产品统计：总共份数 + 剩余未完毕份数
                    const remaining = p.unactivated.length + p.pending.length;
                    return `
                    <div class="p-3 mb-2 bg-gray-50 rounded-lg flex justify-between items-center">
                        <div class="flex-1 cursor-pointer hover:text-blue-600" onclick="openProductModal(${p.id})">
                            <p class="font-medium text-sm break-words">${p.name}</p>
                            <p class="text-xs text-gray-500 mt-1">总共${p.total}份 · 剩余${remaining}份未完毕</p>
                        </div>
                        <div class="flex flex-col gap-1 ml-2">
                            <button onclick="editProductName(${catIndex}, ${p.id}, event)" class="text-xs text-blue-600 px-2 py-1">修改</button>
                            <button onclick="deleteProduct(${catIndex}, ${p.id}, event)" class="text-xs text-red-600 px-2 py-1">删除</button>
                        </div>
                    </div>
                `;
                }).join('')}
                <button onclick="addProduct(${catIndex}, event)" class="w-full mt-2 py-2 bg-green-500 text-white rounded-lg text-sm font-semibold hover:bg-green-600">
                    + 新建权益产品
                </button>
            </div>
        </div>
    `}).join('');
}

// 折叠分类
function toggleCategory(el) {
    const list = el.nextElementSibling;
    list.classList.toggle('hidden');
    el.querySelector('.toggle-icon').textContent = list.classList.contains('hidden') ? '▼' : '▲';
}

// 获取产品
function getProductById(id) {
    for(let cat of appData.categories) {
        const p = cat.products.find(pro => pro.id == id);
        if(p) return p;
    }
    return null;
}

function openProductModal(id) {
    currentProduct = getProductById(id);
    document.getElementById('productModal').classList.remove('hidden');
    document.getElementById('modalTitle').textContent = currentProduct.name;
    renderTabContent();
    updateCount();
    document.body.style.overflow = 'hidden';
}

function closeProductModal() {
    document.getElementById('productModal').classList.add('hidden');
    document.body.style.overflow = 'auto';
    currentProduct = null;
    currentTab = "unactivated";
}

// 切换标签
function switchTab(el) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    currentTab = el.dataset.tab;
    renderTabContent();
}

// 渲染标签内容+按钮
function renderTabContent() {
    const container = document.getElementById('tabContent');
    const list = currentProduct[currentTab];
    const batchBtn = document.getElementById('batchBtn');
    const actionBtn = document.getElementById('batchActionBtn');

    // 根据当前标签设置按钮文字
    if(list.length > 0) {
        batchBtn.classList.remove('hidden');
        if(currentTab === 'unactivated') {
            actionBtn.textContent = '批量激活选中项';
            actionBtn.className = 'w-full bg-blue-600 text-white py-3 rounded-lg font-semibold';
        } else if(currentTab === 'pending') {
            actionBtn.textContent = '批量核销选中项';
            actionBtn.className = 'w-full bg-blue-600 text-white py-3 rounded-lg font-semibold';
        } else if(currentTab === 'done') {
            actionBtn.textContent = '批量复原到未激活';
            actionBtn.className = 'w-full bg-orange-500 text-white py-3 rounded-lg font-semibold';
        }
    } else {
        batchBtn.classList.add('hidden');
    }

    if(list.length === 0) {
        container.innerHTML = '<p class="text-center text-gray-400 py-10">暂无内容</p>';
        return;
    }

    container.innerHTML = list.map(item => `
        <div class="flex items-center p-3 mb-2 border rounded-lg">
            <input type="checkbox" class="item-checkbox w-5 h-5" value="${item}" id="item_${item}">
            <label for="item_${item}" class="ml-3 font-medium">权益序号：${item}</label>
        </div>
    `).join('');
}

// 更新数量统计
function updateCount() {
    document.getElementById('countUnactivated').textContent = currentProduct.unactivated.length;
    document.getElementById('countPending').textContent = currentProduct.pending.length;
    document.getElementById('countDone').textContent = currentProduct.done.length;
}

// 批量操作（含正向操作+复原操作）
function batchAction() {
    const selected = Array.from(document.querySelectorAll('.item-checkbox:checked')).map(el => Number(el.value));
    if(selected.length === 0) return alert('请先选中要操作的权益');

    // 不同tab对应不同操作逻辑
    if(currentTab === 'unactivated') {
        // 未激活→激活到待核销
        currentProduct.unactivated = currentProduct.unactivated.filter(i => !selected.includes(i));
        currentProduct.pending.push(...selected);
        alert('批量激活完成！');
    } else if(currentTab === 'pending') {
        // 待核销→核销到完毕
        currentProduct.pending = currentProduct.pending.filter(i => !selected.includes(i));
        currentProduct.done.push(...selected);
        alert('批量核销完成！');
    } else if(currentTab === 'done') {
        // 完毕→复原回未激活
        if(confirm('确认将选中权益复原回【未激活】吗？')) {
            currentProduct.done = currentProduct.done.filter(i => !selected.includes(i));
            currentProduct.unactivated.push(...selected);
            alert('复原完成！已退回未激活列表');
        } else return;
    }

    // 操作完自动保存数据到本地
    saveData();
    updateCount();
    renderTabContent();
    renderCategoryList();
}

// 初始化：加载本地数据再渲染
loadData();
renderCategoryList();
</script>
<style>
.tab-btn {
    @apply px-3 py-1 rounded-full text-sm border flex-shrink-0;
}
.tab-btn.active {
    @apply bg-blue-600 text-white border-blue-600;
}
.hidden {
    display: none !important;
}
</style>
</body>
</html>
